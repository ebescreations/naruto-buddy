<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naruto Buddy 🍥</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0f0f1a;
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      header {
        width: 100%;
        padding: 14px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.04);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }
      .logo {
        font-size: 18px;
        font-weight: 800;
        color: #ffd700;
        letter-spacing: 1px;
      }
      .logo span {
        color: #ff6b35;
      }
      .tagline {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 1px;
      }
      #picker {
        width: 100%;
        max-width: 860px;
        padding: 14px 24px 0;
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .cbtn {
        border: 2px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        padding: 6px 16px;
        font-size: 12px;
        font-weight: 700;
        font-family: "Segoe UI", sans-serif;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.5);
        transition: all 0.2s;
        user-select: none;
      }
      .cbtn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .cbtn[data-char="naruto"].active {
        color: #ffd700;
        border-color: #ffd700;
        background: rgba(255, 215, 0, 0.08);
        box-shadow: 0 0 12px #ffd70033;
      }
      .cbtn[data-char="sasuke"].active {
        color: #aa88ff;
        border-color: #aa88ff;
        background: rgba(170, 136, 255, 0.08);
        box-shadow: 0 0 12px #aa88ff33;
      }
      .cbtn[data-char="sakura"].active {
        color: #ff88bb;
        border-color: #ff88bb;
        background: rgba(255, 136, 187, 0.08);
        box-shadow: 0 0 12px #ff88bb33;
      }
      .cbtn[data-char="kakashi"].active {
        color: #88ccff;
        border-color: #88ccff;
        background: rgba(136, 204, 255, 0.08);
        box-shadow: 0 0 12px #88ccff33;
      }
      .cbtn[data-char="lee"].active {
        color: #88ff99;
        border-color: #88ff99;
        background: rgba(136, 255, 153, 0.08);
        box-shadow: 0 0 12px #88ff9933;
      }
      #stage-wrap {
        width: 100%;
        max-width: 860px;
        padding: 14px 24px 0;
      }
      #stage {
        position: relative;
        width: 100%;
        height: 400px;
        border-radius: 18px;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          #1a1a2e 0%,
          #16213e 55%,
          #0f3460 100%
        );
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 60px rgba(0, 100, 255, 0.1);
      }
      #stage::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          radial-gradient(
            1.5px 1.5px at 12% 18%,
            rgba(255, 255, 255, 0.5) 0%,
            transparent 100%
          ),
          radial-gradient(
            1px 1px at 35% 8%,
            rgba(255, 255, 255, 0.4) 0%,
            transparent 100%
          ),
          radial-gradient(
            1.5px 1.5px at 58% 14%,
            rgba(255, 255, 255, 0.5) 0%,
            transparent 100%
          ),
          radial-gradient(
            1px 1px at 78% 6%,
            rgba(255, 255, 255, 0.35) 0%,
            transparent 100%
          ),
          radial-gradient(
            1.5px 1.5px at 90% 20%,
            rgba(255, 255, 255, 0.5) 0%,
            transparent 100%
          );
      }
      #cv {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
      }
      #lbl {
        position: absolute;
        top: 36%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Arial Black", sans-serif;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 2px;
        opacity: 0;
        pointer-events: none;
        white-space: nowrap;
        z-index: 60;
        transition: opacity 0.3s;
        text-align: center;
      }
      #st {
        position: absolute;
        top: 10px;
        right: 12px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.2);
        z-index: 10;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #jutsu-bar {
        width: 100%;
        max-width: 860px;
        padding: 14px 24px 0;
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .jbtn {
        border: none;
        border-radius: 22px;
        padding: 8px 18px;
        font-size: 12px;
        font-family: "Segoe UI", sans-serif;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.1s,
          opacity 0.2s,
          box-shadow 0.2s;
        user-select: none;
        letter-spacing: 0.3px;
      }
      .jbtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
      }
      .jbtn:active {
        transform: scale(0.95);
      }
      .jbtn:disabled {
        opacity: 0.3;
        cursor: default;
        transform: none;
        box-shadow: none;
      }
      .footer-note {
        margin-top: 20px;
        padding-bottom: 20px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.15);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Naruto <span>Buddy</span> 🍥</div>
      <div class="tagline">your shinobi work companion</div>
    </header>
    <div id="picker">
      <button class="cbtn active" data-char="naruto">🍥 Naruto</button>
      <button class="cbtn" data-char="sasuke">⚡ Sasuke</button>
      <button class="cbtn" data-char="sakura">🌸 Sakura</button>
      <button class="cbtn" data-char="kakashi">📖 Kakashi</button>
      <button class="cbtn" data-char="lee">🥊 Rock Lee</button>
    </div>
    <div id="stage-wrap">
      <div id="stage">
        <canvas id="cv"></canvas>
        <div id="lbl"></div>
        <div id="st">idle</div>
      </div>
    </div>
    <div id="jutsu-bar"></div>
    <div class="footer-note">
      fan project · not affiliated with masashi kishimoto or viz media
    </div>
    <script src="buddy.js"></script>
  </body>
</html>
